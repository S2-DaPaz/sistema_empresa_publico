name: rv_sistema_mobile
description: Mobile app for Sistema Empresa
publish_to: "none"
version: 1.2.9+31

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  device_info_plus: ^10.1.2
  dio: ^5.4.3
  flutter_map: ^8.2.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.1.0
  http: ^1.2.1
  image: ^4.5.4
  image_picker: ^1.0.7
  intl: ^0.19.0
  latlong2: ^0.9.1
  open_filex: ^4.5.0
  package_info_plus: ^8.0.0
  path: ^1.9.0
  path_provider: ^2.1.2
  printing: ^5.12.0
  share_plus: ^10.0.2
  signature: ^5.4.0
  url_launcher: ^6.2.6
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/rv_ui_asset_kit/brand/
    - assets/rv_ui_asset_kit/icons/
    - assets/rv_ui_asset_kit/illustrations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/rv_ui_asset_kit/brand/rv-app-icon-512.png
  remove_alpha_ios: true
