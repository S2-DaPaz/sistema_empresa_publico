name: Backup PostgreSQL (Neon)

on:
  schedule:
    # Diário às 03:00 UTC (00:00 BRT)
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente (production, staging)"
        required: false
        default: "production"

concurrency:
  group: backup-postgres
  cancel-in-progress: false

env:
  BACKUP_DIR: /tmp/backup
  APP_ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}

jobs:
  backup:
    name: Backup & Upload
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnupg curl
          # Adicionar repositório oficial do PostgreSQL para obter versão 17
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/postgresql.gpg
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Verificar ferramentas
        run: |
          echo "pg_dump: $(pg_dump --version)"
          echo "gpg: $(gpg --version | head -1)"
          echo "node: $(node --version)"

      - name: Executar backup (pg_dump + validação + criptografia)
        id: backup
        env:
          DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT }}
          BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
        run: |
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          chmod +x scripts/backup-postgres.sh
          bash scripts/backup-postgres.sh

      - name: Instalar rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash

      - name: Upload para Google Drive
        id: upload
        env:
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_SCOPE: drive.file
          RCLONE_CONFIG_GDRIVE_TOKEN: ${{ secrets.GDRIVE_RCLONE_TOKEN }}
          RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          BACKUP_RETENTION_COUNT: ${{ vars.BACKUP_RETENTION_COUNT || '30' }}
        run: |
          echo "Verificando configuração rclone..."
          rclone about gdrive: --json || { echo "ERRO: rclone não conseguiu conectar ao Drive"; exit 1; }

          echo "Fazendo upload dos arquivos de backup..."
          rclone copy "${{ steps.backup.outputs.encrypted_file }}" gdrive: -v
          rclone copy "${{ steps.backup.outputs.sha256_file }}" gdrive: -v
          rclone copy "${{ steps.backup.outputs.manifest_file }}" gdrive: -v

          echo "Listando backups no Drive..."
          rclone ls gdrive: --include "*.dump.gpg"

          # Retenção: contar e remover backups antigos
          BACKUPS=$(rclone lsf gdrive: --include "*.dump.gpg" --files-only | sort)
          COUNT=$(echo "${BACKUPS}" | grep -c . || true)
          MAX=${BACKUP_RETENTION_COUNT}
          echo "Backups no Drive: ${COUNT}/${MAX}"

          if [ "${COUNT}" -gt "${MAX}" ]; then
            REMOVE_COUNT=$((COUNT - MAX))
            echo "Removendo ${REMOVE_COUNT} backups antigos..."
            echo "${BACKUPS}" | head -n "${REMOVE_COUNT}" | while read -r FILE; do
              PREFIX="${FILE%.dump.gpg}"
              rclone delete gdrive: --include "${PREFIX}*" -v
            done
          fi

      - name: Notificar API (webhook - opcional)
        if: always()
        continue-on-error: true
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL || '' }}
          BACKUP_WEBHOOK_SECRET: ${{ secrets.BACKUP_WEBHOOK_SECRET }}
        run: |
          if [ -z "${APP_BASE_URL}" ] || [ -z "${BACKUP_WEBHOOK_SECRET}" ]; then
            echo "Webhook não configurado (APP_BASE_URL ou BACKUP_WEBHOOK_SECRET ausente). Pulando."
            exit 0
          fi

          # Notificar início (ou resultado se já temos dados)
          STATUS="${{ job.status }}"
          SUCCESS="false"
          ERROR_MSG=""

          if [ "${STATUS}" = "success" ]; then
            SUCCESS="true"
          else
            ERROR_MSG="Workflow finalizado com status: ${STATUS}"
          fi

          # Enviar resultado
          curl -sf -X POST "${APP_BASE_URL}/api/backups/webhook" \
            -H "Content-Type: application/json" \
            -H "x-backup-secret: ${BACKUP_WEBHOOK_SECRET}" \
            -d "{
              \"action\": \"start\",
              \"trigger_source\": \"github_actions\",
              \"run_id\": \"${GITHUB_RUN_ID}\",
              \"commit_sha\": \"${GITHUB_SHA}\"
            }" || echo "Webhook start falhou (não crítico)"

          # Se temos dados do backup, enviar complete
          if [ -n "${{ steps.backup.outputs.base_name }}" ]; then
            BACKUP_RUN_ID=$(curl -sf -X POST "${APP_BASE_URL}/api/backups/webhook" \
              -H "Content-Type: application/json" \
              -H "x-backup-secret: ${BACKUP_WEBHOOK_SECRET}" \
              -d "{
                \"action\": \"start\",
                \"trigger_source\": \"github_actions\"
              }" 2>/dev/null | node -e "process.stdin.on('data',d=>{try{console.log(JSON.parse(d).data.backup_run_id)}catch(e){}})" || echo "")

            if [ -n "${BACKUP_RUN_ID}" ]; then
              curl -sf -X POST "${APP_BASE_URL}/api/backups/webhook" \
                -H "Content-Type: application/json" \
                -H "x-backup-secret: ${BACKUP_WEBHOOK_SECRET}" \
                -d "{
                  \"action\": \"complete\",
                  \"backup_run_id\": ${BACKUP_RUN_ID},
                  \"success\": ${SUCCESS},
                  \"file_name\": \"${{ steps.backup.outputs.base_name }}.dump\",
                  \"encrypted_file_name\": \"${{ steps.backup.outputs.base_name }}.dump.gpg\",
                  \"sha256\": \"${{ steps.backup.outputs.original_sha256 }}\",
                  \"file_size_bytes\": ${{ steps.backup.outputs.dump_size || '0' }},
                  \"storage_provider\": \"google_drive\",
                  \"error_message\": \"${ERROR_MSG}\"
                }" || echo "Webhook complete falhou (não crítico)"
            fi
          fi

      - name: Resumo
        if: always()
        run: |
          echo "## Backup PostgreSQL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | ${APP_ENVIRONMENT} |" >> $GITHUB_STEP_SUMMARY
          echo "| Arquivo | ${{ steps.backup.outputs.base_name }}.dump.gpg |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamanho dump | ${{ steps.backup.outputs.dump_size }} bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| Tamanho criptografado | ${{ steps.backup.outputs.encrypted_size }} bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| SHA-256 | \`${{ steps.backup.outputs.original_sha256 }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tabelas | ${{ steps.backup.outputs.table_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Duração | ${{ steps.backup.outputs.duration }}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
